<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

   <header>
        <nav>
            <h2>E-commerce</h2>
            <ul>
                <li><a href="../home/index.html">Home</a></li>
                <li><a href="../contact/contact.html">Contact</a></li>
                <li><a href="../about/about.html">About</a></li>
                <li><a href="../sign/sign.html">Sign Up</a></li>
                <li><a href="../shop/shop.html" class="shop-btn">Shop</a></li>
            </ul>
            <input type="text" placeholder="What are you looking for?">
         
        </nav>
    </header>
    <section class="checkout-container">
        <div class="billing-details">
            <h2>Billing Details</h2>
            <form id="checkout-form">
                <label>First Name</label>
                <input class="bir" type="text" required>
                
                <label>Last Name</label>
                <input class="bir"  type="text" required>
                
                <label>State</label>
                <select required>
                    <option>Choose...</option>
                    <option>State 1</option>
                    <option>State 2</option>
                </select>
                
                <label>City</label>
                <input class="bir"  type="text" required>

                <label>Address</label>
                <input class="bir"  type="text" required>

                <label>Zip</label>
                <input class="bir"  type="text" required>

                <label>Tel</label>
                <input class="bir"  type="text" required>

                <label>Email</label>
                <input class="bir"  type="email" required>

   
            </form>
        </div>

        <div class="payment-details">
            <h2>Payment</h2>
            <div class="cards">

                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAACoCAMAAABt9SM9AAAAllBMVEX
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASMAAACtCAMAAADMM+kDAAABAlBMVEX/ABj/qhj
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAACoCAMAAABt9SM9AAAAkFBMVEX
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAACoCAMAAABt9SM9AAAA6lBMVEX
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASMAAACtCAMAAADMM+kDAAABpFBMVEXMAAEAZsv
                    <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAkGBxATEBAQERASExAQDRUXERERFRIQFhAWFhcYGBgVGBUYHigkHRolHRcVITEjJSkrLi46GCszODMsNygtLisBCgoKDg0OGhAQGyslICI3Ny0tLS0tLSsvLS0rMC0wLystLSsrLS0tLS0tLS0tLS0vLS0tLS0tLS0tLSstKy0vLf/AABEIAMcA/QMBEQACEQEDEQH/xAAcAAABBAMBAAAAAAAAAAAAAAAAAgMGBwEEBQj/xABOEAACAQIBBQkMBwUGBgMAAAABAgADBBEFBgchNRIxQVFUYXKxsxM0cXN0gZGSk8HR0hUWIjJSdaEUI0KisjZEYoKDhRczU2Ph8SQlQ
                  
                
            </div>
            <label>Card Number</label>
            <input class="iki"  type="text" required>
            
            <div class="card-info">
                <input class="bir"  type="number" placeholder="MM" required>
                <input class="bir"  type="number" placeholder="YY" required>
                <input class="bir"  type="number" placeholder="CVC" required>
            </div>

            <div class="summary">
                <p>Subtotal: <span id="subtotal">0$</span></p>
                <p>Shipping: <span>FREE</span></p>
                <p>Total: <span id="total-price">0$</span></p>
                <input type="submit" id="place-order">
            </div>
        </div>
    </section>

    <script src="checkout.js"></script>
</body>
</html>
