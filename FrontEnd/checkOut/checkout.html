<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

    <header>
        <nav>
            <h2>E-commerce</h2>
            <ul>
                <li><a href="../home/index.html">Home</a></li>
                <li><a href="../contact/contact.html">Contact</a></li>
                <li><a href="../about/about.html">About</a></li>
                <li><a href="../sign/sign.html">Sign Up</a></li>
                <li><a href="../shop/shop.html" class="shop-btn">Shop</a></li>
            </ul>
            <input type="text" placeholder="What are you looking for?">
        </nav>
    </header>

    <form id="checkout-form">
        <section class="checkout-container">
            <div class="billing-details">
                <h2>Billing Details</h2>
                
                <label for="firstName">First Name</label>
                <input class="bir" id="firstName" type="text" required placeholder="John">
                
                <label for="lastName">Last Name</label>
                <input class="bir" id="lastName" type="text" required placeholder="Doe">
                
                <label for="state">State</label>
                <select id="state" required>
                    <option value="">Choose...</option>
                    <option value="state1">State 1</option>
                    <option value="state2">State 2</option>
                </select>
                
                <label for="city">City</label>
                <input class="bir" id="city" type="text" required placeholder="Baku">

                <label for="address">Address</label>
                <input class="bir" id="address" type="text" required placeholder="Nizami str. 45">

                <label for="zip">Zip</label>
                <input class="bir" id="zip" type="text" required placeholder="AZ1000">

                <label for="tel">Tel</label>
                <input class="bir" id="tel" type="tel" required placeholder="+994">

                <label for="email">Email</label>
                <input class="bir" id="email" type="email" required placeholder="example@gmail.com">
            </div>

            <div class="payment-details">
                <h2>Payment</h2>
                <div class="cards">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASw..." alt="card">
                </div>
                
                <label for="cardNumber">Card Number</label>
                <input class="iki" id="cardNumber" type="text" pattern="\d{16}" minlength="16" maxlength="16" placeholder="1234567812345678" required>
                
                <div class="card-info">
                    <input class="bir" type="number" min="1" max="12" placeholder="MM" required>
                    <input class="bir" type="number" min="26" max="35" placeholder="YY" required>
                    <input class="bir" type="number" min="100" max="999" placeholder="CVC" required>
                </div>

                <div class="summary">
                    <p>Subtotal: <span id="subtotal">0$</span></p>
                    <p>Shipping: <span>FREE</span></p>
                    <p>Total: <span id="total-price">0$</span></p>
                    <button type="submit" id="place-order" class="save-btn" style="width: 100%; padding: 12px; background: #ff4d4d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Place Order</button>
                </div>
            </div>
        </section>
    </form>

    <script src="checkout.js"></script>
</body>
</html>
