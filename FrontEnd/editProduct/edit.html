<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Məhsul Redaktə Et</title>
    <link rel="stylesheet" href="./edit.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <h2 class="logo">Exclusive</h2>
        </div>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../contact.html">Contact</a></li>
            <li><a href="../aboutss.html">About</a></li>
            <li><a href="../signUp.html">Sign Up</a></li>
            <li><a href="../shop/shop.html" class="shop-btn">Shop</a></li>
        </ul>
        <div class="nav-right">
            <input type="text" class="search-box" placeholder="Axtar...">
            <button class="login-btn">Giriş</button>
        </div>
    </nav>

    <div class="container">
        <h2 class="title">Məhsul Redaktə Et</h2>
        <form id="editProductForm" enctype="multipart/form-data">
            <label for="brand">Brend</label>
            <input type="text" id="brand" name="brand" placeholder="Məhsulun brendi" required>
            
            <label for="model">Model</label>
            <input type="text" id="model" name="model" placeholder="Məhsulun modeli">
            
            <label for="category">Kategoriya</label>
            <input type="text" id="category" name="categoryName" placeholder="Məhsulun kateqoriyası">
            
            <label for="description">Açıqlama</label>
            <textarea id="description" name="description" placeholder="Məhsul haqqında məlumat"></textarea>
            
            <label for="price">Qiymət ($)</label>
            <input type="number" step="0.01" id="price" name="price" placeholder="Məhsulun qiyməti" required>
            
            <label for="rating">Reytinq (1-5)</label>
            <input type="number" id="rating" name="rating" min="1" max="5" placeholder="Məhsulun reytinqi">
            
            <label>Məhsul Şəkli</label>
            <div class="file-upload-wrapper">
                <input type="file" id="imageFile" name="imageFile" accept="image/*">
            </div>
            
            <div style="margin-top: 15px; text-align: center;">
                <p style="color: #aaa; font-size: 12px; margin-bottom: 5px;">Cari Şəkil:</p>
                <img id="preview" src="" alt="Məhsul Şəkli Önizləmə" style="max-width: 180px; display: none; border-radius: 6px; border: 2px solid #28a745; padding: 3px; margin: 0 auto;">
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="save-btn" style="flex: 2;">Yadda Saxla</button>
                <button type="button" class="reset-btn" onclick="window.location.href='../products.html'" style="flex: 1;">Ləğv Et</button>
            </div>
        </form>
    </div>

    <script src="./edit.js"></script>
</body>
</html>
